<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platformer Maker - Key & Rotate</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; }
        #toolbar { background: #2d2d2d; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
        .canvas-container { position: relative; overflow: auto; max-width: 95vw; max-height: 70vh; border: 3px solid #444; background: #000; }
        canvas { display: block; image-rendering: pixelated; }
        button { padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; background: #444; color: white; font-weight: bold; }
        button.active { background: #007bff; }
        .config-panel { background: #2d2d2d; padding: 10px; border-radius: 8px; display: flex; gap: 15px; margin-bottom: 10px; font-size: 0.9em; }
        input[type='number'] { width: 45px; background: #111; color: #fff; border: 1px solid #555; }
        .controls { margin-top: 10px; display: flex; gap: 5px; width: 100%; max-width: 800px; }
        #levelCode { flex-grow: 1; padding: 8px; background: #111; color: #0f0; border: 1px solid #555; }
    </style>
</head>
<body>

    <div id="toolbar">
        <button onclick="setTool('block')" id="btn-block" class="active">Block</button>
        <button onclick="setTool('spike')" id="btn-spike">Spike</button>
        <button onclick="setTool('key')" id="btn-key" style="color: gold;">Key</button>
        <button onclick="setTool('keyblock')" id="btn-keyblock" style="color: #55f;">Key Block</button>
        <button onclick="setTool('goal')" id="btn-goal">Goal</button>
        <button onclick="setTool('eraser')" id="btn-eraser">Eraser</button>
        <button onclick="rotate()">Rotate ↻ <span id="rotLabel">(0°)</span></button>
        <button onclick="toggleGrid()" id="btn-grid">Grid: ON</button>
        <button onclick="toggleMode()" id="btn-mode" style="background: #28a745;">PLAYTEST</button>
    </div>

    <div class="config-panel">
        <label>W: <input type="number" id="inpWidth" value="20" onchange="resizeLevel()"></label>
        <label>H: <input type="number" id="inpHeight" value="10" onchange="resizeLevel()"></label>
        <span id="keyStatus" style="margin-left: 20px; font-weight: bold; color: gold;">Key: 0</span>
    </div>

    <div class="canvas-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="controls">
        <input type="text" id="levelCode" placeholder="Code...">
        <button onclick="loadLevel()">Load</button>
        <button onclick="publishLevel()">Copy Code</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const TILE_SIZE = 40;
        let cols = 20, rows = 10, grid = Array(rows).fill().map(() => Array(cols).fill(null));
        let currentTool = 'block', isPlaying = false, showGrid = true, isDead = false;
        let currentRotation = 0, hasKey = false;
        
        // We keep a backup of the grid to restore keys/items on death
        let playGrid = null;

        let player = { x: 40, y: 40, vx: 0, vy: 0, size: 24, onGround: false, active: true };

        function updateCanvasSize() { canvas.width = cols * TILE_SIZE; canvas.height = rows * TILE_SIZE; }
        updateCanvasSize();

        function setTool(t) { 
            currentTool = t; 
            document.querySelectorAll('#toolbar button').forEach(b => b.classList.remove('active')); 
            const btn = document.getElementById('btn-'+t);
            if(btn) btn.classList.add('active'); 
        }

        function rotate() {
            currentRotation = (currentRotation + 90) % 360;
            document.getElementById('rotLabel').innerText = `(${currentRotation}°)`;
        }

        function toggleGrid() { showGrid = !showGrid; document.getElementById('btn-grid').innerText = `Grid: ${showGrid ? 'ON' : 'OFF'}`; }

        function resizeLevel() {
            const nC = parseInt(document.getElementById('inpWidth').value), nR = parseInt(document.getElementById('inpHeight').value);
            let nG = Array(nR).fill().map(() => Array(nC).fill(null));
            for(let y=0; y<Math.min(rows, nR); y++) for(let x=0; x<Math.min(cols, nC); x++) nG[y][x] = grid[y][x];
            cols = nC; rows = nR; grid = nG; updateCanvasSize();
        }

        function die() {
            if (isDead) return;
            isDead = true; player.active = false;
            setTimeout(() => {
                player.x = TILE_SIZE; player.y = TILE_SIZE;
                player.vx = 0; player.vy = 0;
                player.active = true; isDead = false;
                hasKey = false;
                // Deep copy the original grid to respawn keys
                playGrid = JSON.parse(JSON.stringify(grid));
            }, 1000);
        }

        function toggleMode() {
            isPlaying = !isPlaying;
            document.getElementById('btn-mode').innerText = isPlaying ? "STOP" : "PLAYTEST";
            document.getElementById('btn-mode').style.background = isPlaying ? "#d33" : "#28a745";
            player.active = true; isDead = false; hasKey = false;
            player.x = TILE_SIZE; player.y = TILE_SIZE;
            // Create the gameplay version of the grid
            if(isPlaying) playGrid = JSON.parse(JSON.stringify(grid));
        }

        canvas.addEventListener('mousedown', e => {
            if (isPlaying) return;
            const r = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - r.left) / TILE_SIZE), y = Math.floor((e.clientY - r.top) / TILE_SIZE);
            if (x >= 0 && x < cols && y >= 0 && y < rows) {
                grid[y][x] = currentTool === 'eraser' ? null : { type: currentTool, rot: currentRotation };
            }
        });

        const keys = {};
        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        function update() {
            if (!isPlaying || !player.active) return;
            if (keys['ArrowLeft'] || keys['KeyA']) player.vx = -5;
            else if (keys['ArrowRight'] || keys['KeyD']) player.vx = 5;
            else player.vx *= 0.8;

            if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && player.onGround) { player.vy = -11; player.onGround = false; }
            player.vy += 0.6;

            player.x += player.vx; checkCollisions(true);
            player.y += player.vy; player.onGround = false; checkCollisions(false);
            if (player.y > canvas.height + 50) die();
            document.getElementById('keyStatus').innerText = `Key: ${hasKey ? 1 : 0}`;
        }

        function checkCollisions(isX) {
            const activeGrid = isPlaying ? playGrid : grid;
            for(let y=0; y<rows; y++) {
                for(let x=0; x<cols; x++) {
                    const obj = activeGrid[y][x]; if (!obj) continue;
                    const tx = x*TILE_SIZE, ty = y*TILE_SIZE;
                    if (player.x < tx + TILE_SIZE && player.x + player.size > tx && player.y < ty + TILE_SIZE && player.y + player.size > ty) {
                        if (obj.type === 'block' || (obj.type === 'keyblock' && !hasKey)) {
                            if (isX) {
                                if (player.vx > 0) player.x = tx - player.size; else if (player.vx < 0) player.x = tx + TILE_SIZE;
                                player.vx = 0;
                            } else {
                                if (player.vy > 0) { player.y = ty - player.size; player.vy = 0; player.onGround = true; }
                                else if (player.vy < 0) { player.y = ty + TILE_SIZE; player.vy = 0; }
                            }
                        } else if (!isX && obj.type === 'spike') die();
                        else if (!isX && obj.type === 'key') { hasKey = true; activeGrid[y][x] = null; }
                        else if (!isX && obj.type === 'goal') { alert("Goal!"); toggleMode(); }
                    }
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            const activeGrid = isPlaying ? playGrid : grid;
            for(let y=0; y<rows; y++) {
                for(let x=0; x<cols; x++) {
                    if (showGrid && !isPlaying) { ctx.strokeStyle = '#222'; ctx.strokeRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE); }
                    const cell = activeGrid[y][x]; if (!cell) continue;
                    const px = x*TILE_SIZE + TILE_SIZE/2, py = y*TILE_SIZE + TILE_SIZE/2;
                    
                    ctx.save();
                    ctx.translate(px, py);
                    ctx.rotate(cell.rot * Math.PI / 180);
                    
                    if (cell.type === 'block') { ctx.fillStyle = '#666'; ctx.fillRect(-18, -18, 36, 36); }
                    else if (cell.type === 'spike') { ctx.fillStyle = '#f44'; ctx.beginPath(); ctx.moveTo(0, -15); ctx.lineTo(15, 15); ctx.lineTo(-15, 15); ctx.fill(); }
                    else if (cell.type === 'key') { ctx.fillStyle = 'gold'; ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill(); ctx.fillRect(0, 0, 10, 4); }
                    else if (cell.type === 'keyblock') {
                        ctx.strokeStyle = '#55f'; ctx.lineWidth = 3; ctx.strokeRect(-15, -15, 30, 30);
                        if (!hasKey) { ctx.fillStyle = 'rgba(85, 85, 255, 0.5)'; ctx.fillRect(-15, -15, 30, 30); }
                    }
                    else if (cell.type === 'goal') { ctx.fillStyle = '#0f0'; ctx.fillRect(-5, -15, 5, 30); ctx.fillStyle = '#fff'; ctx.fillRect(0, -15, 15, 10); }
                    ctx.restore();
                }
            }
            if (isPlaying && player.active) { ctx.fillStyle = '#0ff'; ctx.fillRect(player.x, player.y, player.size, player.size); }
            requestAnimationFrame(() => { update(); draw(); });
        }

        function publishLevel() { const code = btoa(JSON.stringify({g:grid, c:cols, r:rows})); document.getElementById('levelCode').value = code; }
        function loadLevel() { const d = JSON.parse(atob(document.getElementById('levelCode').value)); grid = d.g; cols = d.c; rows = d.r; updateCanvasSize(); }
        draw();
    </script>
</body>
</html>
